services:
  tddr-video-worker:
    build:
      context: https://github.com/gabrielsteglich/editorial-ai-worker.git#main
    image: tddr-video-worker:local
    container_name: tddr-video-worker
    restart: unless-stopped
    ports:
      - "4788:4788"
    environment:
      PORT: 4788
      TDDR_VIDEO_PUBLIC_BASE_URL: "https://worker.vazin.com.br"
      TDDR_VIDEO_API_KEY: "troque-por-uma-chave-forte"
      TDDR_VIDEO_RENDER_TIMEOUT_MS: 600000
    volumes:
      - ./data:/app/data
      - ./public:/app/public
    shm_size: "1gb"
